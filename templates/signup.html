<!DOCTYPE html>
<html lang="ht">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1e1b4b] flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl w-80 shadow-2xl">
    <h2 class="text-2xl font-bold mb-4 text-[#1e1b4b]">
        Kreye Kont
    </h2>

    <input id="username"
           placeholder="Username"
           class="w-full p-2 border mb-2 rounded">

    <input id="email"
           type="email"
           placeholder="Email"
           class="w-full p-2 border mb-2 rounded">

    <input id="password"
           type="password"
           placeholder="Modpas"
           class="w-full p-2 border mb-4 rounded">

    <button
        class="w-full bg-[#4f46e5] text-white py-2 rounded">
        ENSKRI
    </button>

    <p class="text-center mt-3 text-sm">
        Ou deja gen kont?
        <a href="/" class="text-[#4f46e5] font-bold">
            Login
        </a>
    </p>

</div>

</body>
</html>
